<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nook</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        color: #292a26;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(198, 169, 124, 0.22),
            transparent 32%
          ),
          linear-gradient(135deg, #fffefa 0%, #f8f6f1 54%, #f1efe8 100%);
        font-family:
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          sans-serif;
      }

      .splash {
        text-align: center;
        animation: fade-in 520ms ease-out both;
      }

      .logo {
        margin: 0;
        font-family: "Gowun Batang", Georgia, serif;
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.01em;
      }

      .logo span {
        color: #c6a97c;
      }

      .tagline {
        margin: 18px 0 0;
        color: #85857d;
        font-size: 16px;
        letter-spacing: -0.03em;
      }

      .line {
        width: 72px;
        height: 1px;
        margin: 24px auto 0;
        background: #c6a97c;
        transform-origin: center;
        animation: grow 520ms 160ms ease-out both;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes grow {
        from {
          transform: scaleX(0);
          opacity: 0;
        }
        to {
          transform: scaleX(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash">
      <h1 class="logo">Nook<span>.</span></h1>
      <p class="tagline">오늘의 생각이 내일의 글이 되도록</p>
      <div class="line" aria-hidden="true"></div>
    </main>
  </body>
</html>
