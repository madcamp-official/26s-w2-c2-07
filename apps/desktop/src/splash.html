<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nook</title>
    <style>
      @font-face {
        font-family: system-ui;
        src: local("Noto Sans KR");
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        color: #2e2721;
        background:
          radial-gradient(circle at 20% 20%, rgba(197, 142, 99, 0.2), transparent 32%),
          linear-gradient(135deg, #fffaf2 0%, #f8f3ea 54%, #f1e5d6 100%);
        font-family:
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          sans-serif;
      }

      .splash {
        text-align: center;
        animation: fade-in 1200ms ease-out both;
      }

      .logo {
        margin: 0;
        font-size: 56px;
        line-height: 1;
        letter-spacing: -0.07em;
      }

      .tagline {
        margin: 18px 0 0;
        color: #8b7a6b;
        font-size: 16px;
        letter-spacing: -0.03em;
      }

      .line {
        width: 72px;
        height: 1px;
        margin: 24px auto 0;
        background: #c58e63;
        transform-origin: center;
        animation: grow 900ms 400ms ease-out both;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes grow {
        from {
          transform: scaleX(0);
          opacity: 0;
        }
        to {
          transform: scaleX(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash">
      <h1 class="logo">Nook</h1>
      <p class="tagline">따뜻하고 편안한 느낌을 유지하고 미니멀리스틱하게 디자인한다</p>
      <div class="line" aria-hidden="true"></div>
    </main>
  </body>
</html>
